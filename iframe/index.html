<!doctype html>
<!--
  内联框架页：须放在扩展 /iframe/ 目录；由 eda.sys_IFrame.openIFrame 加载。
  说明：https://prodocs.lceda.cn/cn/api/guide/inline-frame.html
  API：https://prodocs.lceda.cn/cn/api/reference/pro-api.sys_iframe.openiframe.html
-->
<html lang="zh-Hans">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<!-- 文档：对话框标题可来自 <title>；宿主亦支持 openIFrame 的 props.title -->
		<title data-i18n="setupTitle">焊盘外扩设置</title>
		<style>
			:root {
				--bg: linear-gradient(165deg, #eef2f9 0%, #e8ecf4 50%, #f4f6fa 100%);
				--surface: #ffffff;
				--text: #0f172a;
				--text-muted: #64748b;
				--border: #e2e8f0;
				--border-strong: #cbd5e1;
				--accent: #2563eb;
				--accent-hover: #1d4ed8;
				--accent-soft: rgba(37, 99, 235, 0.08);
				--stop: #c2410c;
				--stop-bg: #fff7ed;
				--stop-border: #fdba74;
				--radius: 10px;
				--radius-sm: 7px;
				--shadow: 0 1px 2px rgba(15, 23, 42, 0.05), 0 4px 12px rgba(15, 23, 42, 0.04);
			}
			* {
				box-sizing: border-box;
			}
			html {
				height: 100%;
				overflow: hidden;
			}
			body {
				margin: 0;
				height: 100%;
				overflow: hidden;
				font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'PingFang SC', 'Microsoft YaHei', sans-serif;
				font-size: 13px;
				line-height: 1.5;
				color: var(--text);
				background: var(--bg);
				-webkit-font-smoothing: antialiased;
			}
			body.is-listening fieldset.card {
				opacity: 0.88;
				pointer-events: none;
			}
			.wrap {
				padding: 12px 14px 14px;
				max-width: 440px;
				margin: 0 auto;
			}
			.header {
				margin-bottom: 10px;
			}
			.header h1 {
				margin: 0 0 8px;
				font-size: 16px;
				font-weight: 650;
				letter-spacing: -0.02em;
				color: var(--text);
			}
			.hint {
				margin: 0;
				color: var(--text-muted);
				font-size: 12px;
				line-height: 1.55;
			}
			.main {
				display: flex;
				flex-direction: column;
				gap: 8px;
			}
			fieldset.card {
				margin: 0;
				padding: 12px 14px 14px;
				border: 1px solid var(--border);
				border-radius: var(--radius);
				background: var(--surface);
				box-shadow: var(--shadow);
			}
			fieldset.card:focus-within {
				border-color: #bfdbfe;
				box-shadow: var(--shadow), 0 0 0 3px var(--accent-soft);
			}
			legend {
				padding: 0 8px 0 2px;
				font-weight: 650;
				font-size: 12px;
				letter-spacing: 0.02em;
				color: var(--text-muted);
			}
			.radio-list {
				display: flex;
				flex-direction: column;
				gap: 4px;
			}
			.radio-row {
				display: flex;
				align-items: flex-start;
				gap: 10px;
				padding: 8px 10px;
				border-radius: var(--radius-sm);
				transition: background 0.15s ease;
			}
			.radio-row:hover {
				background: #f8fafc;
			}
			.radio-row input {
				margin-top: 3px;
				width: 14px;
				height: 14px;
				accent-color: var(--accent);
				cursor: pointer;
			}
			.radio-row label {
				flex: 1;
				cursor: pointer;
				font-size: 13px;
				line-height: 1.45;
			}
			.row {
				margin-bottom: 0;
			}
			label.field {
				display: block;
				font-weight: 600;
				margin-bottom: 6px;
				font-size: 12px;
				color: var(--text);
			}
			.input-wrap {
				position: relative;
			}
			input[type='text'],
			input[type='number'] {
				width: 100%;
				padding: 9px 12px;
				border: 1px solid var(--border-strong);
				border-radius: var(--radius-sm);
				font-size: 14px;
				font-variant-numeric: tabular-nums;
				background: #fafbfc;
				transition: border-color 0.15s, box-shadow 0.15s, background 0.15s;
			}
			input[type='text']:focus,
			input[type='number']:focus {
				outline: none;
				border-color: var(--accent);
				background: var(--surface);
				box-shadow: 0 0 0 3px var(--accent-soft);
			}
			input[type='text']:disabled,
			input[type='number']:disabled {
				opacity: 0.65;
				cursor: not-allowed;
			}
			.unit-pill {
				display: inline-block;
				margin-top: 8px;
				padding: 3px 9px;
				font-size: 11px;
				font-weight: 600;
				color: var(--accent);
				background: var(--accent-soft);
				border-radius: 999px;
				letter-spacing: 0.02em;
			}
			.subhint {
				margin-top: 8px;
				font-size: 11px;
				color: var(--text-muted);
				line-height: 1.45;
			}
			.check-row {
				display: flex;
				align-items: flex-start;
				gap: 10px;
				padding: 10px 12px;
				border-radius: var(--radius-sm);
				background: linear-gradient(180deg, #f8fafc 0%, #f1f5f9 100%);
				border: 1px solid var(--border);
			}
			.check-row input {
				width: 16px;
				height: 16px;
				margin-top: 2px;
				accent-color: var(--accent);
				cursor: pointer;
			}
			.check-row label {
				cursor: pointer;
				font-weight: 500;
				font-size: 13px;
				line-height: 1.45;
				color: var(--text);
			}
			.action-bar {
				display: flex;
				justify-content: flex-end;
				align-items: center;
				gap: 10px;
				margin-top: 12px;
				padding-top: 12px;
				border-top: 1px solid var(--border);
			}
			button {
				padding: 9px 20px;
				border-radius: var(--radius-sm);
				font-size: 13px;
				font-weight: 600;
				cursor: pointer;
				border: 1px solid var(--border-strong);
				background: var(--surface);
				color: var(--text);
				transition: background 0.15s, border-color 0.15s, box-shadow 0.15s, transform 0.05s;
			}
			button:active:not(:disabled) {
				transform: scale(0.98);
			}
			button:disabled {
				opacity: 0.55;
				cursor: not-allowed;
			}
			button.btn-ghost:hover:not(:disabled) {
				background: #f8fafc;
				border-color: #94a3b8;
			}
			button.btn-primary {
				background: var(--accent);
				border-color: var(--accent-hover);
				color: #fff;
				box-shadow: 0 1px 2px rgba(37, 99, 235, 0.25);
			}
			button.btn-primary:hover:not(:disabled) {
				background: var(--accent-hover);
			}
			button.btn-stop {
				background: var(--stop-bg);
				border-color: var(--stop-border);
				color: var(--stop);
				box-shadow: 0 1px 2px rgba(194, 65, 12, 0.12);
			}
			button.btn-stop:hover:not(:disabled) {
				background: #ffedd5;
				border-color: #fb923c;
			}
			button:focus-visible {
				outline: none;
				box-shadow: 0 0 0 3px var(--accent-soft);
			}
			button.btn-stop:focus-visible {
				box-shadow: 0 0 0 3px rgba(251, 146, 60, 0.35);
			}
		</style>
	</head>
	<body>
		<div class="wrap">
			<header class="header">
				<h1 data-i18n="setupHeading">焊盘外扩设置</h1>
				<p class="hint" data-i18n="setupKindHint">禁止区域会转为电气层上的区域规则；阻焊区域仅在阻焊层保留填充图元。</p>
			</header>

			<main class="main">
				<fieldset class="card">
					<legend data-i18n="legendKind">生成类型</legend>
					<div class="radio-list">
						<div class="radio-row">
							<input type="radio" name="kind" id="k_pour" value="forbidden_pour" checked />
							<label for="k_pour" data-i18n="kindForbiddenPour">禁止区域（禁止铺铜，默认）</label>
						</div>
						<div class="radio-row">
							<input type="radio" name="kind" id="k_fill" value="forbidden_fill" />
							<label for="k_fill" data-i18n="kindForbiddenFill">禁止区域（禁止填充）</label>
						</div>
						<div class="radio-row">
							<input type="radio" name="kind" id="k_sm" value="solder_mask" />
							<label for="k_sm" data-i18n="kindSolderMask">阻焊区域（仅阻焊层图形）</label>
						</div>
					</div>
				</fieldset>

				<fieldset class="card">
					<legend data-i18n="legendWidth">外扩宽度</legend>
					<div class="row">
						<label class="field" for="expansion" data-i18n="labelWidth">单边外扩（相对焊盘外形）</label>
						<div class="input-wrap">
							<input type="text" id="expansion" inputmode="decimal" autocomplete="off" value="10" spellcheck="false" />
						</div>
						<div class="unit-pill" id="widthUnitHint"></div>
						<div class="subhint" data-i18n="widthSubhint">数值将换算为 PCB 内部 mil 后生成几何。</div>
					</div>
				</fieldset>

				<fieldset class="card">
					<legend data-i18n="legendMode">生成模式</legend>
					<div class="check-row">
						<input type="checkbox" id="continuous" />
						<label for="continuous" data-i18n="labelContinuous">启用连续生成模式（在画布上持续点选/框选）</label>
					</div>
				</fieldset>
			</main>

			<footer class="action-bar">
				<button type="button" class="btn-ghost" id="btnCancel" data-i18n="btnCancel">取消</button>
				<button type="button" class="btn-primary" id="btnOk" data-i18n="btnGenerate">生成</button>
			</footer>
		</div>

		<script>
			(function () {
				var STORAGE_KEY = 'pad-expand-helper:iframe-setup';
				var ECHO_KEY = 'pad-expand-helper:listening-echo';
				var IFRAME_ID = 'pad-sm-guard-setup';
				var MAX_MIL = 2000;
				var applySeq = 0;
				var continuousListeningUi = false;
				var echoPollTimer = null;
				var echoPollStartTs = 0;

				var translations = {
					'zh-Hans': {
						setupTitle: '焊盘外扩设置',
						setupHeading: '焊盘外扩设置',
						setupKindHint: '禁止区域会转为电气层上的区域规则；阻焊区域仅在阻焊层保留填充图元。',
						legendKind: '生成类型',
						kindForbiddenPour: '禁止区域（禁止铺铜，默认）',
						kindForbiddenFill: '禁止区域（禁止填充）',
						kindSolderMask: '阻焊区域（仅阻焊层图形）',
						legendWidth: '外扩宽度',
						labelWidth: '单边外扩（相对焊盘外形）',
						widthSubhint: '数值将换算为 PCB 内部 mil 后生成几何。',
						widthUnitSuffix: '当前单位：',
						legendMode: '生成模式',
						labelContinuous: '启用连续生成模式（在画布上持续点选/框选）',
						btnCancel: '取消',
						btnGenerate: '生成',
						btnStop: '停止生成',
						errInvalid: '请输入有效的外扩数值。',
						errPositive: '请输入大于 0 的外扩值。',
						errLarge: '输入过大，请输入小于等于 2000 mil 的值。',
					},
					en: {
						setupTitle: 'pad-expand-helper: setup',
						setupHeading: 'pad-expand-helper: setup',
						setupKindHint:
							'Forbidden regions become copper-layer region rules; solder-mask output keeps fills on solder-mask layers only.',
						legendKind: 'Output type',
						kindForbiddenPour: 'Forbidden region (no copper pour, default)',
						kindForbiddenFill: 'Forbidden region (no fills)',
						kindSolderMask: 'Solder mask only (fills on solder-mask layers)',
						legendWidth: 'Expansion',
						labelWidth: 'Single-side offset from pad outline',
						widthSubhint: 'Values are converted to PCB mils before geometry.',
						widthUnitSuffix: 'Unit: ',
						legendMode: 'Mode',
						labelContinuous: 'Continuous mode (click / box-select on canvas)',
						btnCancel: 'Cancel',
						btnGenerate: 'Generate',
						btnStop: 'Stop generation',
						errInvalid: 'Enter a valid number.',
						errPositive: 'Enter a value greater than 0.',
						errLarge: 'Value too large (max 2000 mil).',
					},
				};

				function resolveLang(callback) {
					var fallback = 'zh-Hans';
					try {
						if (typeof eda !== 'undefined' && eda.sys_I18n && typeof eda.sys_I18n.getCurrentLanguage === 'function') {
							var r = eda.sys_I18n.getCurrentLanguage();
							if (r && typeof r.then === 'function') {
								r.then(function (l) {
									callback(l || fallback);
								}).catch(function () {
									callback(fallback);
								});
								return;
							}
							callback(r || fallback);
							return;
						}
					} catch (e) {}
					callback(fallback);
				}

				function applyI18n(lang) {
					var dict = translations[lang] || translations['zh-Hans'];
					document.querySelectorAll('[data-i18n]').forEach(function (el) {
						var k = el.getAttribute('data-i18n');
						if (k && dict[k]) {
							el.textContent = dict[k];
						}
					});
					if (dict.setupTitle) {
						document.title = dict.setupTitle;
					}
					return dict;
				}

				function convertToMil(raw, unit) {
					var n = parseFloat(String(raw).trim().replace(/,/g, ''));
					if (!isFinite(n) || n < 0) {
						return null;
					}
					var u = unit || 'mm';
					var sys = eda.sys_Unit;
					if (u === 'mm') {
						return sys.mmToMil(n, 6);
					}
					if (u === 'mil') {
						return n;
					}
					if (u === 'inch' || u === 'in') {
						return sys.inchToMil(n, 6);
					}
					if (u === 'cm') {
						return sys.mmToMil(n * 10, 6);
					}
					if (u === 'dm') {
						return sys.mmToMil(n * 100, 6);
					}
					if (u === 'm') {
						return sys.mmToMil(n * 1000, 6);
					}
					return sys.mmToMil(n, 6);
				}

				function validateExpansion(dict) {
					var raw = document.getElementById('expansion').value;
					var unit = window.__padExpUnit;
					var mil = convertToMil(raw, unit);
					if (mil === null) {
						alert(dict.errInvalid);
						return false;
					}
					if (mil <= 0) {
						alert(dict.errPositive);
						return false;
					}
					if (mil > MAX_MIL) {
						alert(dict.errLarge);
						return false;
					}
					return true;
				}

				function writeResultSync(payload) {
					var s = JSON.stringify(payload);
					try {
						sessionStorage.setItem(STORAGE_KEY, s);
					} catch (e) {}
				}

				function writeResultAsync(payload) {
					var s = JSON.stringify(payload);
					writeResultSync(payload);
					if (typeof eda === 'undefined' || !eda.sys_Storage || typeof eda.sys_Storage.setExtensionUserConfig !== 'function') {
						return Promise.resolve(false);
					}
					return eda.sys_Storage.setExtensionUserConfig(STORAGE_KEY, s).catch(function () {
						return false;
					});
				}

				function closeFrameAsync() {
					if (typeof eda === 'undefined' || !eda.sys_IFrame || typeof eda.sys_IFrame.closeIFrame !== 'function') {
						return Promise.resolve(false);
					}
					var p = eda.sys_IFrame.closeIFrame(IFRAME_ID);
					function normalizeCloseResult(r) {
						// 部分宿主 Promise 解析为 undefined，仍视为已发起关闭
						if (r === undefined || r === null) {
							return true;
						}
						return r;
					}
					if (p && typeof p.then === 'function') {
						return p.then(normalizeCloseResult).catch(function () {
							return false;
						});
					}
					return Promise.resolve(normalizeCloseResult(p));
				}

				/** 仅用于 iframe 内异常提示（成功路径不刷屏） */
				function toastIframeError(msg) {
					try {
						if (typeof eda !== 'undefined' && eda.sys_Message && typeof eda.sys_Message.showToastMessage === 'function') {
							var info = typeof ESYS_ToastMessageType !== 'undefined' ? ESYS_ToastMessageType.INFO : 0;
							eda.sys_Message.showToastMessage('[pad-expand-helper·iframe] ' + msg, info, 6);
						}
					} catch (e) {}
				}

				function setFormEditDisabled(disabled) {
					document.querySelectorAll('input[name="kind"]').forEach(function (el) {
						el.disabled = !!disabled;
					});
					document.getElementById('expansion').disabled = !!disabled;
					document.getElementById('continuous').disabled = !!disabled;
				}

				function getDict() {
					return translations[window.__padExpLang || 'zh-Hans'] || translations['zh-Hans'];
				}

				function refreshPrimaryLabel() {
					var dict = getDict();
					var btn = document.getElementById('btnOk');
					btn.classList.remove('btn-primary', 'btn-stop');
					if (continuousListeningUi) {
						btn.textContent = dict.btnStop;
						btn.classList.add('btn-stop');
					} else {
						btn.textContent = dict.btnGenerate;
						btn.classList.add('btn-primary');
					}
				}

				function stopEchoPoll() {
					if (echoPollTimer) {
						clearInterval(echoPollTimer);
						echoPollTimer = null;
					}
				}

				function readEchoPayload() {
					try {
						if (typeof eda === 'undefined' || !eda.sys_Storage || typeof eda.sys_Storage.getExtensionUserConfig !== 'function') {
							return null;
						}
						var v = eda.sys_Storage.getExtensionUserConfig(ECHO_KEY);
						if (v === undefined || v === null) {
							return null;
						}
						if (typeof v === 'object' && v !== null) {
							return v;
						}
						if (typeof v === 'string') {
							return JSON.parse(v);
						}
					} catch (e) {}
					return null;
				}

				function startEchoPoll() {
					stopEchoPoll();
					echoPollStartTs = Date.now();
					echoPollTimer = setInterval(function () {
						if (!continuousListeningUi) {
							stopEchoPoll();
							return;
						}
						var o = readEchoPayload();
						if (o && o.listening === false && typeof o.t === 'number' && o.t >= echoPollStartTs - 1000) {
							setContinuousListeningUi(false);
						}
					}, 400);
				}

				function setContinuousListeningUi(on) {
					continuousListeningUi = !!on;
					document.body.classList.toggle('is-listening', continuousListeningUi);
					setFormEditDisabled(continuousListeningUi);
					refreshPrimaryLabel();
					document.getElementById('btnCancel').disabled = false;
					if (continuousListeningUi) {
						startEchoPoll();
					} else {
						stopEchoPoll();
					}
				}

				function onCancel() {
					stopEchoPoll();
					writeResultAsync({ cancelled: true }).finally(function () {
						closeFrameAsync();
					});
				}

				function onStopListening() {
					writeResultAsync({ command: 'stopInteractive' })
						.catch(function (err) {
							toastIframeError('停止失败: ' + String(err && err.message ? err.message : err));
						})
						.finally(function () {
							setContinuousListeningUi(false);
						});
				}

				function onPrimaryClick() {
					if (continuousListeningUi) {
						onStopListening();
					} else {
						submitApply();
					}
				}

				function submitApply() {
					var dict = getDict();
					if (!validateExpansion(dict)) {
						return;
					}
					var kind = (document.querySelector('input[name="kind"]:checked') || {}).value || 'forbidden_pour';
					var expansionInput = document.getElementById('expansion').value.trim();
					var continuous = document.getElementById('continuous').checked;
					applySeq += 1;
					var payload = {
						cancelled: false,
						kind: kind,
						expansionInput: expansionInput,
						continuous: continuous,
						seq: applySeq,
					};
					document.getElementById('btnOk').disabled = true;
					document.getElementById('btnCancel').disabled = true;
					writeResultAsync(payload)
						.then(function () {
							document.getElementById('btnOk').disabled = false;
							document.getElementById('btnCancel').disabled = false;
							if (continuous) {
								setContinuousListeningUi(true);
							}
						})
						.catch(function (err) {
							toastIframeError('写入失败: ' + String(err && err.message ? err.message : err));
							document.getElementById('btnOk').disabled = false;
							document.getElementById('btnCancel').disabled = false;
						});
				}

				function boot() {
					resolveLang(function (lang) {
						window.__padExpLang = lang || 'zh-Hans';
						applyI18n(window.__padExpLang);
						finishBoot(window.__padExpLang);
					});
				}

				function finishBoot(lang) {
					eda.sys_Unit.getFrontendDataUnit().then(function (unit) {
						window.__padExpUnit = unit;
						var u = unit || 'mm';
						var map = { mm: 'mm', mil: 'mil', inch: 'inch', in: 'in', cm: 'cm', dm: 'dm', m: 'm' };
						var label = map[u] || String(u);
						var dict = translations[lang] || translations['zh-Hans'];
						document.getElementById('widthUnitHint').textContent = dict.widthUnitSuffix + label;
					});
					document.getElementById('btnCancel').addEventListener('click', onCancel);
					document.getElementById('btnOk').addEventListener('click', onPrimaryClick);
				}

				if (document.readyState === 'loading') {
					document.addEventListener('DOMContentLoaded', boot);
				} else {
					boot();
				}
			})();
		</script>
	</body>
</html>
